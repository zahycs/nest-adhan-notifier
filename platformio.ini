[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = partition.csv
build_flags = !"C:\Users\zahyh\.platformio\penv\Scripts\python.exe" git_rev_macro.py
	-DELEGANTOTA_USE_ASYNC_WEBSERVER=1
lib_deps = 
	bblanchon/ArduinoJson
	esp8266-google-home-notifier
	https://github.com/mathieucarbou/ESPAsyncWebServer.git
	https://github.com/mathieucarbou/AsyncTCP.git
	ayushsharma82/ElegantOTA@^3.1.7
